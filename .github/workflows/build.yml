name: Build APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool wget unzip

      - name: Install buildozer and cython
        run: |
          pip install buildozer cython

      - name: Accept SDK license and install build-tools manually
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR"
          cd "$SDK_DIR"
          if [ ! -d "cmdline-tools" ]; then
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
            unzip -q cmdline-tools.zip -d cmdline-tools
            mv cmdline-tools/cmdline-tools cmdline-tools/latest
            rm cmdline-tools.zip
          fi
          export PATH="$SDK_DIR/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --licenses > /dev/null 2>&1
          sdkmanager "build-tools;33.0.0" > /dev/null 2>&1
          if [ -f "$SDK_DIR/build-tools/33.0.0/aidl" ]; then
            echo "✅ Aidl installed successfully."
          else
            echo "❌ Aidl not found. Build-tools installation failed."
            exit 1
          fi

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
